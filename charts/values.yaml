movieService:
  image:
    repository: gabrielamand/movie-service
    tag: latest
    pullPolicy: Always
  service:
    port: 8000
    type: ClusterIP
  env:
    DATABASE_URI: "postgresql://movie_db_username:movie_db_password@movie-db/movie_db_dev"
    CAST_SERVICE_HOST_URL: "http://cast-service:8000/api/v1/casts/"

castService:
  image:
    repository: gabrielamand/cast-service
    tag: latest
    pullPolicy: Always
  service:
    port: 8000
    type: ClusterIP
  env:
    DATABASE_URI: "postgresql://cast_db_username:cast_db_password@cast-db/cast_db_dev"

movieDb:
  image:
    repository: postgres
    tag: 12.1-alpine
    pullPolicy: IfNotPresent
  service:
    port: 5432
    type: ClusterIP
  env:
    POSTGRES_USER: movie_db_username
    POSTGRES_PASSWORD: movie_db_password
    POSTGRES_DB: movie_db_dev

castDb:
  image:
    repository: postgres
    tag: 12.1-alpine
    pullPolicy: IfNotPresent
  service:
    port: 5432
    type: ClusterIP
  env:
    POSTGRES_USER: cast_db_username
    POSTGRES_PASSWORD: cast_db_password
    POSTGRES_DB: cast_db_dev

nginx:
  image:
    repository: nginx
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8080
    type: NodePort
    nodePort: 30008